<!DOCTYPE html>

<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,300&family=Spline+Sans:wght@400;500;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#1c1714;display:flex;align-items:center;justify-content:center;min-height:100vh;}
  .map-wrap{
    position:relative;width:100%;max-width:960px;aspect-ratio:960/580;
    border-radius:6px;overflow:hidden;
    border:1px solid rgba(217,154,78,0.2);
    box-shadow:0 40px 80px -20px rgba(0,0,0,0.7);
  }
  .map-svg{width:100%;height:100%;display:block;}

  /* SVG-native pins — scale perfectly with the map */
  .pin-grp{cursor:pointer;}
  .pin-core{ transition:r .3s cubic-bezier(0.16,1,0.3,1); }
  .pin-grp:hover .pin-core{ r:9; }
  .pin-pulse{ transform-origin:center; transform-box:fill-box; }
  .pin-tip-grp{ opacity:0; transition:opacity .25s; pointer-events:none; }
  .pin-grp:hover .pin-tip-grp{ opacity:1; }

  @keyframes pulse-ring{
    0%{ r:6; opacity:0.5; }
    100%{ r:22; opacity:0; }
  }
  .pulse-anim{ animation:pulse-ring 2.6s ease-out infinite; }
  .pulse-anim2{ animation:pulse-ring 2.6s ease-out infinite; animation-delay:1.3s; }

  .map-header{position:absolute;bottom:1.3rem;left:1.5rem;z-index:30;pointer-events:none;}
  .map-title{font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:1.1rem;color:rgba(244,237,226,0.8);}
  .map-sub{font-size:0.67rem;letter-spacing:0.13em;text-transform:uppercase;color:rgba(244,237,226,0.3);margin-top:0.2rem;}
  .legend{position:absolute;bottom:1.2rem;right:1.5rem;z-index:30;display:flex;gap:1.2rem;pointer-events:none;}
  .li{display:flex;align-items:center;gap:0.4rem;font-size:0.66rem;color:rgba(244,237,226,0.35);letter-spacing:0.06em;font-family:'Spline Sans',sans-serif;}
  .ld{width:7px;height:7px;border-radius:50%;}
</style>
</head>
